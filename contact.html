<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    padding-top: 80px;
    text-align: center;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
}

nav a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: bold;
}

/* FORMULAIRE */
.container {
    width: 40%;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BOUTON */
button {
    padding: 12px 30px;
    border-radius: 10px;
    border: 2px solid rgba(56, 189, 248, 0.8);
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    color: #38bdf8;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #38bdf8;
    color: black;
}
</style>

</head>

<body>

<nav>
    ./index.htmlAccueil</a>
    ./competences.htmlCompétences</a>
    ./parcours.htmlParcours</a>
    ./projects.htmlProjets</a>
    ./contact.htmlContact</a>
</nav>

<h1>Contactez-moi 📩</h1>

<div class="container">
    <form>
        <input type="text" placeholder="Nom" required>
        <input type="email" placeholder="Email" required>
        <textarea rows="5" placeholder="Votre message..." required></textarea>
        <button type="submit">Envoyer</button>
    </form>
</div>

</body>
</html>
